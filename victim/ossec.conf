<ossec_config>
  <client>
    <server>
      <address>10.0.2.30</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
  </client>

  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    
    <!-- File Integrity Monitoring (FIM) per la macchina vittima -->
    <!-- I file della vittima sono montati in /victim_fs dal docker-compose -->
    <directories check_all="yes" realtime="yes">/victim_fs/etc/passwd,/victim_fs/etc/shadow,/victim_fs/var/www</directories>
    
    <!-- Esclusioni base per evitare rumore -->
    <ignore>/victim_fs/etc/mtab</ignore>
    <ignore type="sregex">.log$|.swp$</ignore>
  </syscheck>

  <!-- Monitoraggio Log di Sistema della Vittima -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/victim_fs/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/victim_fs/var/log/syslog</location>
  </localfile>
  
  <localfile>
    <log_format>apache</log_format>
    <location>/victim_fs/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/victim_fs/var/log/apache2/error.log</location>
  </localfile>

</ossec_config>
