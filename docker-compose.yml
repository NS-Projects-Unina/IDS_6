networks:
  attacker_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.0.1.0/24

  victim_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.0.2.0/24

services:

  attacker:
    build: ./attacker
    container_name: attacker
    hostname: attacker
    networks:
      attacker_net:
        ipv4_address: 10.0.1.10
    cap_add:
      - NET_ADMIN
    tty: true
    stdin_open: true
    volumes:
      - ./exploits:/exploits
    restart: unless-stopped

  victim:
    image: tleemcjr/metasploitable2
    container_name: victim
    hostname: victim
    networks:
      victim_net:
        ipv4_address: 10.0.2.10
    ports:
      - "8080:80"
    tty: true

  defense:
    build: ./defense
    container_name: defense
    hostname: defense
    networks:
      attacker_net:
        ipv4_address: 10.0.1.254
      victim_net:
        ipv4_address: 10.0.2.254
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - suricata_logs:/var/log/suricata
      - wazuh-agent-data:/var/ossec
    restart: unless-stopped

  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.5
    container_name: wazuh-manager
    hostname: wazuh-manager
    networks:
      victim_net:
        ipv4_address: 10.0.2.30
    ports:
      - "1514:1514/tcp"
      - "1515:1515"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=admin
      - FILEBEAT_SSL_VERIFICATION_MODE=none
    extra_hosts:
      - "wazuh.indexer:10.0.2.31"
    volumes:
      - suricata_logs:/var/log/suricata:ro
      - wazuh-manager-data:/var/ossec
      - ./wazuh/config/ossec.conf:/var/ossec/etc/ossec.conf:ro
      - ./wazuh/rules/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
      - ./wazuh/rules/local_decoder.xml:/var/ossec/etc/decoders/local_decoder.xml:ro
    depends_on:
      - wazuh-indexer
    restart: unless-stopped

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.5
    container_name: wazuh-indexer
    hostname: wazuh-indexer
    networks:
      victim_net:
        ipv4_address: 10.0.2.31
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "bootstrap.memory_lock=true"
      - "discovery.type=single-node"
      - "plugins.security.disabled=true"
      - "network.host=0.0.0.0"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
    restart: unless-stopped

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.5
    container_name: wazuh-dashboard
    hostname: wazuh-dashboard
    networks:
      victim_net:
        ipv4_address: 10.0.2.32
    ports:
      - "5601:5601"
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=admin
      - WAZUH_API_URL=https://wazuh-manager
      - API_USERNAME=wazuh
      - API_PASSWORD=wazuh
    extra_hosts:
      - "wazuh.indexer:10.0.2.31"
      - "wazuh.manager:10.0.2.30"
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    restart: unless-stopped

volumes:
  suricata_logs:
  wazuh-indexer-data:
  wazuh-agent-data:
  wazuh-manager-data:
