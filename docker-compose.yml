networks:
  attacker_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.0.1.0/24

  victim_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.0.2.0/24

services:

  attacker:
    build: ./attacker
    container_name: attacker
    hostname: attacker
    networks:
      attacker_net:
        ipv4_address: 10.0.1.10
    cap_add:
      - NET_ADMIN
    tty: true
    stdin_open: true
    volumes:
      - ./exploits:/exploits
    restart: unless-stopped

  victim:
    image: tleemcjr/metasploitable2
    container_name: victim
    hostname: victim
    networks:
      victim_net:
        ipv4_address: 10.0.2.10
    ports:
      - "8080:80"
    tty: true

  defense:
    build: ./defense
    container_name: defense
    hostname: defense
    networks:
      attacker_net:
        ipv4_address: 10.0.1.254
      victim_net:
        ipv4_address: 10.0.2.254
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - suricata_logs:/var/log/suricata
    restart: unless-stopped

  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.5
    container_name: wazuh-manager
    hostname: wazuh-manager
    networks:
      victim_net:
        ipv4_address: 10.0.2.30
    ports:
      - "1514:1514/udp"
      - "1515:1515"
    volumes:
      - suricata_logs:/var/log/suricata:ro
    restart: unless-stopped

volumes:
  suricata_logs:
